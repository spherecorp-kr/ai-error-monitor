# Monitoring targets configuration
# Each target defines a project/service group to monitor

targets:
  - name: drcall-global
    type: loki
    region: ap-southeast-7
    loki_url: http://k8s-monitori-lokiinte-0b3e2d4945-598e4159caa5c488.elb.ap-southeast-7.amazonaws.com:3100
    loki_queries:
      backend: '{namespace="drcall-global-prod", level=~"ERROR|CRITICAL"} |~ "exception|error|fatal"'
      frontend: '{namespace="drcall-global-prod", source="frontend", kind="error"}'
    github:
      owner: spherecorp-kr
      repos:
        backend: drcall-global-backend
        frontend: drcall-global-frontend
    branch: develop
    services:
      - patient-service
      - hospital-service
      - appointment-service
      - messaging-service
      - payment-service
      - admin-service
      - storage-service
      - translation-service
      - video-call-service
      - shipping-service
      - webhook-receiver-service

