name: Deploy AI Error Monitor

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/**'
      - 'config/**'
      - 'terraform/**'
      - 'requirements.txt'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-7
  ENVIRONMENT: prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-ai-error-monitor
  cancel-in-progress: false

jobs:
  build:
    name: Lambda 패키지 빌드
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lambda 패키지 빌드
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: dist/*.zip
          retention-days: 3

  deploy:
    name: Terraform 배포
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Lambda 패키지 다운로드
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: dist/

      - name: AWS 자격증명 설정 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform 설정
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config=environments/${ENVIRONMENT}-backend.hcl

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file=environments/${ENVIRONMENT}.tfvars -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply tfplan

  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: AWS 자격증명 설정 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-test
          aws-region: ${{ env.AWS_REGION }}

      - name: Lambda 배포 확인
        run: |
          echo "🔍 Lambda 함수 확인 중..."
          for FUNC in collector analyzer; do
            NAME="ai-error-monitor-${ENVIRONMENT}-${FUNC}"
            MODIFIED=$(aws lambda get-function-configuration --function-name $NAME --query 'LastModified' --output text)
            echo "✅ ${NAME}: ${MODIFIED}"
          done
          echo "⏰ 실제 실행은 매일 자정(KST) EventBridge 스케줄로 동작합니다."

  summary:
    name: 배포 요약
    needs: [build, deploy, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 요약 생성
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          TEST_RESULT: ${{ needs.smoke-test.result }}
          SOURCE_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          GIT_SHA=$(echo "$SOURCE_SHA" | cut -c1-7)
          echo "## 🤖 AI Error Monitor 배포 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **환경** | PROD (Lambda) |" >> $GITHUB_STEP_SUMMARY
          echo "| **리전** | ap-southeast-7 (Bangkok) |" >> $GITHUB_STEP_SUMMARY
          echo "| **커밋** | \`${GIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **실행자** | @${ACTOR} |" >> $GITHUB_STEP_SUMMARY
          echo "| **빌드** | ${BUILD_RESULT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **배포** | ${DEPLOY_RESULT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **테스트** | ${TEST_RESULT} |" >> $GITHUB_STEP_SUMMARY
